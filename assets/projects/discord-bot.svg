<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#7c3aed" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.16">
    <path d="M0 40H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 110H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 180H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 250H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 320H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M0 390H800" stroke="#ffffff" stroke-width="1"/>
    <path d="M80 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M160 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M240 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M320 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M400 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M480 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M560 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M640 0V450" stroke="#ffffff" stroke-width="1"/>
    <path d="M720 0V450" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Simple "bot" glyph (discord-like) -->
  <g transform="translate(280 105)">
    <path d="M80 0C57 0 40 17 40 40V70C40 93 57 110 80 110H120C143 110 160 93 160 70V40C160 17 143 0 120 0H80Z" fill="url(#bot)" opacity="0.95"/>
    <path d="M80 20C70 20 62 28 62 38V68C62 78 70 86 80 86H120C130 86 138 78 138 68V38C138 28 130 20 120 20H80Z" fill="#0b1020" opacity="0.35"/>

    <!-- "Eyes" -->
    <circle cx="85" cy="54" r="8" fill="#e9d5ff"/>
    <circle cx="115" cy="54" r="8" fill="#93c5fd"/>

    <!-- Antenna -->
    <path d="M98 -14L98 20" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
    <circle cx="98" cy="-18" r="10" fill="#60a5fa" opacity="0.95"/>

    <!-- Base -->
    <path d="M40 110C40 145 60 170 80 170H120C140 170 160 145 160 110C160 110 145 125 120 125H80C55 125 40 110 40 110Z" fill="url(#bot)" opacity="0.85"/>
  </g>

  <!-- Accent dots -->
  <g opacity="0.7">
    <circle cx="120" cy="70" r="7" fill="#e9d5ff"/>
    <circle cx="160" cy="100" r="5" fill="#93c5fd"/>
    <circle cx="680" cy="140" r="6" fill="#a78bfa"/>
    <circle cx="640" cy="85" r="4" fill="#60a5fa"/>
  </g>
</svg>

